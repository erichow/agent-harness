<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="sketchy-edge-soft" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#ffffff" rx="8" />

  <!-- ============================================================ -->
  <!-- ① Context Rot — decreasing accuracy curve                   -->
  <!-- ============================================================ -->
  <g>
    <text x="150" y="28" font-family="system-ui, sans-serif" font-size="22"
          fill="#6366f1" text-anchor="middle" font-weight="700">① Context Rot</text>
    <text x="150" y="50" font-family="system-ui, sans-serif" font-size="14"
          fill="#94a3b8" text-anchor="middle">Chroma 2025.7</text>

    <!-- Axes -->
    <line x1="40" y1="220" x2="260" y2="220" stroke="#1e293b" stroke-width="2" />
    <line x1="40" y1="70" x2="40" y2="220" stroke="#1e293b" stroke-width="2" />

    <!-- Curve -->
    <path d="M 40 75 Q 100 90 150 130 T 260 210"
          fill="none" stroke="#6366f1" stroke-width="3"
          filter="url(#sketchy-edge-soft)" />

    <!-- Labels -->
    <text x="150" y="250" font-family="system-ui, sans-serif" font-size="14"
          fill="#1e293b" text-anchor="middle">输入长度 →</text>
    <text x="25" y="150" font-family="system-ui, sans-serif" font-size="14"
          fill="#1e293b" text-anchor="middle" transform="rotate(-90 25 150)">准确率</text>
  </g>

  <!-- ============================================================ -->
  <!-- ② Lost in the Middle — U-shaped curve                       -->
  <!-- ============================================================ -->
  <g>
    <text x="450" y="28" font-family="system-ui, sans-serif" font-size="22"
          fill="#06b6d4" text-anchor="middle" font-weight="700">② Lost in the Middle</text>
    <text x="450" y="50" font-family="system-ui, sans-serif" font-size="14"
          fill="#94a3b8" text-anchor="middle">Liu et al. 2023</text>

    <!-- Axes -->
    <line x1="340" y1="220" x2="560" y2="220" stroke="#1e293b" stroke-width="2" />
    <line x1="340" y1="70" x2="340" y2="220" stroke="#1e293b" stroke-width="2" />

    <!-- U-shaped curve -->
    <path d="M 340 80 Q 380 100 410 170 T 480 170 T 560 80"
          fill="none" stroke="#06b6d4" stroke-width="3"
          filter="url(#sketchy-edge-soft)" />

    <!-- Labels -->
    <text x="450" y="250" font-family="system-ui, sans-serif" font-size="14"
          fill="#1e293b" text-anchor="middle">位置：开头 ← 中间 → 结尾</text>
    <text x="325" y="150" font-family="system-ui, sans-serif" font-size="14"
          fill="#1e293b" text-anchor="middle" transform="rotate(-90 325 150)">检索准确率</text>
  </g>

  <!-- ============================================================ -->
  <!-- ③ RULER — claimed vs effective window size                  -->
  <!-- ============================================================ -->
  <g>
    <text x="750" y="28" font-family="system-ui, sans-serif" font-size="22"
          fill="#f59e0b" text-anchor="middle" font-weight="700">③ RULER</text>
    <text x="750" y="50" font-family="system-ui, sans-serif" font-size="14"
          fill="#94a3b8" text-anchor="middle">Hsieh et al. 2024</text>

    <!-- Claimed bar (full width) -->
    <rect x="640" y="90" width="220" height="36" fill="#f1f5f9" stroke="#1e293b" stroke-width="2" />
    <text x="750" y="114" font-family="system-ui, sans-serif" font-size="16"
          fill="#1e293b" text-anchor="middle" font-weight="700">标称 128K</text>

    <!-- Effective bar (much shorter) -->
    <rect x="640" y="150" width="55" height="36" fill="#f59e0b" stroke="#1e293b" stroke-width="2" />
    <text x="745" y="174" font-family="system-ui, sans-serif" font-size="16"
          fill="#1e293b" text-anchor="start">有效 ≈ 32K</text>

    <!-- Warning text -->
    <text x="750" y="220" font-family="system-ui, sans-serif" font-size="14"
          fill="#ef4444" text-anchor="middle" font-weight="700">通常少 4-8×</text>
  </g>
</svg>
